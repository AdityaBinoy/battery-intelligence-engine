<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Battery Intelligence Engine</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🔋 Adaptive Multi-Cell Battery Intelligence Engine</h1>

<div class="cards">

<div class="card">
<h3>Cell 1</h3>
<p id="c1"></p>
</div>

<div class="card">
<h3>Cell 2</h3>
<p id="c2"></p>
</div>

<div class="card">
<h3>Cell 3</h3>
<p id="c3"></p>
</div>

<div class="card">
<h3>Cell 4</h3>
<p id="c4"></p>
</div>

</div>

<div class="summary">

<h2>Pack Summary</h2>

<p><b>Average Voltage:</b> <span id="avg"></span></p>
<p><b>Imbalance:</b> <span id="imb"></span></p>
<p><b>Strongest Cell:</b> <span id="strong"></span></p>
<p><b>Weakest Cell:</b> <span id="weak"></span></p>
<p><b>Health Status:</b> <span id="status"></span></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
